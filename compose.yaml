services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastplayer-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:80"
    environment:
      APP_NAME: FASTPLAYER
      APP_ENV: local
      APP_DEBUG: "true"
      APP_TARGET: player
      APP_URL: http://127.0.0.1:8000
      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8000,localhost:8000,127.0.0.1,localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: fastplayer
      DB_USERNAME: fastplayer
      DB_PASSWORD: fastplayer
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: database
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "false"
    env_file:
      - .env
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: fastplayer-mysql
    environment:
      MYSQL_DATABASE: fastplayer
      MYSQL_USER: fastplayer
      MYSQL_PASSWORD: fastplayer
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fastplayer-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
